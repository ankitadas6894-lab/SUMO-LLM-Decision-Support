<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phi-3 Decision Support System</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --phi-cyan: #00e5ff;
            --road-base: #30363d;
            --node-color: #58a6ff;
            --highlight-cyan: #00e5ff;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        .sidebar { 
            width: 380px; 
            padding: 25px; 
            background: var(--sidebar-bg); 
            border-right: 2px solid var(--phi-cyan); 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
        }

        h2 { color: var(--phi-cyan); margin-top: 0; font-size: 1.4em; text-transform: uppercase; }
        h3 { font-size: 0.8em; color: #8b949e; margin-top: -10px; margin-bottom: 20px; letter-spacing: 1px; }

        label { display: block; margin-top: 12px; font-size: 0.85em; color: #8b949e; font-weight: 600; }
        
        select, button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 6px; 
            border-radius: 8px; 
            border: 1px solid #30363d; 
            background: #0d1117; 
            color: white; 
            font-size: 0.95em;
        }

        button { 
            background: var(--phi-cyan); 
            color: #0d1117; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px;
            border: none;
            transition: 0.3s ease;
        }

        button:hover { background: #70f0ff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }

        .result-box { 
            margin-top: 20px; 
            padding: 15px; 
            background: #0d1117; 
            border-radius: 10px; 
            border-left: 4px solid var(--phi-cyan);
            display: none; 
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .metric { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .metric b { color: #8b949e; }
        
        /* Highlight the AI processing time for your comparison */
        .time-highlight { color: #4ade80; font-weight: bold; }

        #explanationText { 
            background: rgba(0, 229, 255, 0.05);
            padding: 10px;
            border-radius: 5px;
            font-style: italic;
            color: #d1d5db;
            border: 1px dashed #30363d;
            font-size: 0.9em;
        }

        .map-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .svg-container { width: 95%; height: 95%; }
        .road-line { stroke: var(--road-base); stroke-width: 4; stroke-linecap: round; opacity: 0.4; }
        #highlightPath { stroke: var(--highlight-cyan); stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: url(#glowPhi); }
        .node-dot { fill: var(--phi-cyan); stroke: var(--bg-dark); stroke-width: 2; }
        .node-label { fill: white; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🤖 Phi-3 Agent</h2>
    <h3>ITS Decision Support</h3>
    
    <label>Vehicle Type</label>
    <select id="vehicle">
        <option value="Car">Car</option>
        <option value="Ambulance">Abulance</option>
    </select>

    <label>Objective</label>
    <select id="objective">
        <option value="Fastest route">Optimize for Speed</option>
        <option value="Safe route">Optimize for Safety</option>
    </select>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Source</label>
            <select id="source">
                <option value="d">Node D</option><option value="f">Node F</option><option value="e">Node E</option><option value="h">Node H</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label>Destination</label>
            <select id="destination">
                <option value="h">Node H</option><option value="f">Node F</option>
            </select>
        </div>
    </div>

    <label>Traffic Level</label>
    <select id="traffic">
        <option value="Low">Low Density</option>
        <option value="Medium">Medium Density</option>
        <option value="High">Heavy Congestion</option>
    </select>

    <button id="runBtn" onclick="runAnalysis()">Analyze with Phi-3</button>

    <div id="resultBox" class="result-box">
        <div class="metric"><b>Recommended:</b> <span id="routeDisplay" style="color:var(--phi-cyan)"></span></div>
        <div class="metric"><b>SUMO Travel Time:</b> <span id="timeDisplay"></span></div>
        <div class="metric"><b>AI Response Time:</b> <span id="procTimeDisplay" class="time-highlight"></span></div>
        <div class="metric"><b>Congestion:</b> <span id="congDisplay"></span></div>
        <hr style="border: 0; border-top: 1px solid #30363d; margin: 15px 0;">
        <label style="margin-top: 0;">Phi-3 Reasoning:</label>
        <p id="explanationText"></p>
    </div>
</div>

<div class="map-area">
    <div class="svg-container">
        <svg id="mainSvg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="glowPhi" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
            </defs>
            <g id="baseRoadsLayer"></g>
            <path id="highlightPath" d="" />
            <g id="nodeLayer"></g>
        </svg>
    </div>
</div>

<script>
    const nodeCoords = {
        "d": [200, 50],  "e": [350, 50],  "i": [750, 50],
        "f": [200, 180], "g": [350, 180], "j": [930, 180],
        "k": [100, 300], "l": [200, 300], "m": [300, 300], "n": [400, 300],
        "a": [200, 420], "b": [300, 420], "c": [750, 420],
        "o": [830, 360], "p": [830, 480], "h": [930, 420]
    };

    const connections = [
        ["d","f"], ["f","e"], ["f","k"], ["f","m"], ["k","a"], ["m","b"], ["a","c"], ["b","c"], 
        ["c","o"], ["c","p"], ["c","i"], ["o","h"], ["p","h"], ["h","j"], ["j","i"], ["j","g"], ["g","l"],
        ["g","n"], ["l","a"], ["n","b"], ["g","e"], ["e","i"], ["i","j"], ["i","c"]
    ];

    function initMap() {
        const roadLayer = document.getElementById("baseRoadsLayer");
        const nodeLayer = document.getElementById("nodeLayer");

        connections.forEach(([u, v]) => {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", nodeCoords[u][0]); line.setAttribute("y1", nodeCoords[u][1]);
            line.setAttribute("x2", nodeCoords[v][0]); line.setAttribute("y2", nodeCoords[v][1]);
            line.classList.add("road-line");
            roadLayer.appendChild(line);
        });

        for (let node in nodeCoords) {
            const [x, y] = nodeCoords[node];
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x); circle.setAttribute("cy", y); circle.setAttribute("r", 5);
            circle.classList.add("node-dot");
            nodeLayer.appendChild(circle);

            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
            label.setAttribute("x", x + 10); label.setAttribute("y", y + 4);
            label.textContent = node.toUpperCase();
            label.classList.add("node-label");
            nodeLayer.appendChild(label);
        }
    }

    async function runAnalysis() {
        const btn = document.getElementById("runBtn");
        btn.innerText = "Phi-3 is Processing...";
        btn.disabled = true;

        const payload = {
            vehicle_type: document.getElementById("vehicle").value,
            objective: document.getElementById("objective").value,
            source: document.getElementById("source").value,
            destination: document.getElementById("destination").value,
            traffic_level: document.getElementById("traffic").value
        };

        try {
            // Note: Update to 8001 if your Phi backend is on that port
            const response = await fetch("http://127.0.0.1:8001/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            document.getElementById("routeDisplay").innerText = data.recommended_route;
            document.getElementById("timeDisplay").innerText = data.travel_time;
            document.getElementById("procTimeDisplay").innerText = data.processing_time;
            document.getElementById("congDisplay").innerText = data.congestion;
            document.getElementById("explanationText").innerText = data.explanation;
            document.getElementById("resultBox").style.display = "block";

            drawHighlight(data.recommended_route);
        } catch (err) { 
            console.error("API Error", err); 
            alert("Backend Error: Check if port 8001 is active.");
        } finally {
            btn.innerText = "Analyze with Phi-3";
            btn.disabled = false;
        }
    }

    function drawHighlight(routeStr) {
        const path = document.getElementById("highlightPath");
        const nodes = routeStr.split(" -> ").map(n => n.trim().toLowerCase());
        let d = nodes.map((n, i) => {
            const pt = nodeCoords[n];
            return (i === 0 ? "M" : "L") + ` ${pt[0]} ${pt[1]}`;
        }).join(" ");

        path.setAttribute("d", d);
        const length = path.getTotalLength();
        path.style.transition = 'none';
        path.style.strokeDasharray = length;
        path.style.strokeDashoffset = length;
        path.getBoundingClientRect(); 
        path.style.transition = 'stroke-dashoffset 1.2s ease-in-out';
        path.style.strokeDashoffset = "0";
    }

    initMap();
</script>
</body>
</html>
